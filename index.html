<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フルスペック・ロジックツリー＆ボトルネックチェッカー</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --bg:#090D13;       
  --panel-bg:#151922; 
  --border:#30363D;   
  --text:#F0F6FF;     
  --muted:#8B949E;    
  --blue-glow:#388BFD;
  --card-bg:#1F242E;  
  --line-color:#30363D;
  --zoom-scale: 0.85; 

  /* ボトルネックチェッカー用カラー */
  --red:#EF4444;
  --green:#10B981;
  --yellow:#F59E0B;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:16px}

header{text-align:center;margin-bottom:16px}
header h1{font-size:18px;font-weight:700}

.layout{display:grid;grid-template-columns:340px 1fr;gap:16px;max-width:1600px;margin:0 auto;height:calc(100vh - 80px)}
@media(max-width:900px){.layout{grid-template-columns:1fr;height:auto}}

/* ── 左側：入力パネル ── */
.panel{background:var(--panel-bg);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;flex-direction:column}
.panel-title{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;font-family:monospace;text-transform:uppercase}
.cheatsheet{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px;font-size:10px;color:var(--muted);margin-bottom:12px;line-height:1.4}

#title-input {
  background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text);
  padding: 8px 12px; font-size: 13px; outline: none; margin-bottom: 12px;
}
textarea{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Courier New',monospace;font-size:11px;padding:12px;resize:none;outline:none;line-height:1.5;min-height:250px}

/* ── 右側：キャンバス ── */
.tree-canvas{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:20px;overflow:auto;display:flex;flex-direction:column;position:relative}

/* コントロール＆サマリーカウンター */
.canvas-controls-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-shrink:0;padding-bottom:10px;border-bottom:1px solid rgba(48,54,61,0.3);gap:10px;flex-wrap:wrap}
.counter-box{display:flex;gap:12px;font-size:11px;font-weight:600;font-family:monospace}
.count-item{display:flex;align-items:center;gap:4px}
.count-dot{width:8px;height:8px;border-radius:50%}

.canvas-controls{display:flex;align-items:center;gap:16px;}
.zoom-ctrl{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.zoom-ctrl input[type="range"] { cursor: pointer; accent-color: var(--blue-glow); width: 80px; }
#zoom-val { font-family: monospace; color: var(--text); min-width: 35px; }
.download-btn{background:#238636;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;}

/* 表示領域 */
.canvas-body { display: flex; flex-direction: column; gap: 16px; flex: 1; justify-content: start; }
.title-zone { width: 100%; border-bottom: 1px solid rgba(48,54,61,0.2); padding-bottom: 8px; }
.canvas-title { font-size: 18px; font-weight: 700; color: var(--text); }

.tree-zone { flex: 1; overflow: auto; display: flex; align-items: center; }
.tree-container { transform: scale(var(--zoom-scale)); transform-origin: left center; display: flex; flex-direction: column; }
.tree-branch { display: flex; align-items: center; position: relative; }

/* ── 4角ボックス（ボトルネック対応） ── */
.node-box {
  background: var(--card-bg); border: 1px solid var(--border); color: var(--text);
  padding: 8px 12px; border-radius: 6px; min-width: 150px; max-width: 190px; 
  text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.3); position: relative; z-index: 2; display: flex; flex-direction: column; gap: 2px;
  border-left: 3px solid var(--border); /* 左端にステータス線をデフォルト配置 */
}
.node-box.root-node { border: 1.5px solid var(--blue-glow); border-left: 4px solid var(--blue-glow); box-shadow: 0 0 10px rgba(56, 139, 253, 0.2); }
.node-title { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.node-sub { font-size: 10px; color: var(--blue-glow); font-weight: 700; font-family: monospace; }
.node-box:not(.has-val) .node-sub { color: var(--muted); font-weight: 400; }

/* ボトルネックアラートクラス */
.node-box.bn-bottleneck { border-left-color: var(--red); background: rgba(239, 68, 68, 0.05); border-color: rgba(239, 68, 68, 0.4); }
.node-box.bn-causal { border-left-color: var(--green); background: rgba(16, 185, 129, 0.05); border-color: rgba(16, 185, 129, 0.3); }
.node-box.bn-corr { border-left-color: var(--yellow); background: rgba(245, 158, 11, 0.05); border-color: rgba(245, 158, 11, 0.3); }

/* 接続線 */
.children-container { display: flex; flex-direction: column; gap: 12px; padding-left: 24px; position: relative; }
.node-box::after { content: ''; position: absolute; top: 50%; right: -12px; width: 12px; height: 1px; background: var(--line-color); z-index: 1; }
.node-box.leaf::after { display: none; } 
.children-container > .tree-branch::before { content: ''; position: absolute; top: 50%; left: -12px; width: 12px; height: 1px; background: var(--line-color); z-index: 1; }
.children-container > .tree-branch::after { content: ''; position: absolute; left: -12px; width: 1px; background: var(--line-color); z-index: 1; }
.children-container > .tree-branch:first-child::after { top: 50%; bottom: 0; }
.children-container > .tree-branch:last-child::after { top: 0; height: 50%; }
.children-container > .tree-branch:not(:first-child):not(:last-child)::after { top: 0; bottom: 0; }
.children-container > .tree-branch:first-child:last-child::after { display: none; } 

/* 画像エクスポート用スタイル */
.canvas-body.exporting {
  display: flex !important; flex-direction: row !important; align-items: center !important; gap: 32px !important; padding: 40px !important; background: #090D13 !important; width: max-content !important; height: auto !important;
}
.canvas-body.exporting .title-zone { width: 180px !important; border-right: 1px solid rgba(48,54,61,0.5) !important; border-bottom: none !important; padding-bottom: 0 !important; padding-right: 20px !important; }
.canvas-body.exporting .tree-container { transform: none !important; }
</style>
</head>
<body>

<header>
  <h1>高性能ロジックツリー ＆ ボトルネックチェッカー</h1>
</header>

<div class="layout">
  <div class="panel">
    <div class="panel-title">// ツリーのヘッダータイトル</div>
    <input type="text" id="title-input" value="派遣ビジネス 課題特定ボトルネックツリー">
    
    <div class="panel-title">// 書き方ルール（チートシート）</div>
    <div class="cheatsheet">
      <strong>構文:</strong> 指標名 | 数値 | 影響度 | 関係性<br>
      ・影響度: 1〜10 の数値<br>
      ・関係性: 「因果」または「相関」<br>
      <span style="color:var(--red)">★影響度7以上で「相関」または「未設定」だと自動でボトルネックアラート(赤)になります。</span>
    </div>

    <div class="panel-title">// エディタ</div>
    <textarea id="tree-input" spellcheck="false">💰 売上（円）
  [A] 月間稼働人数（人） [+]
    【① 新規稼働人数】
      新規応募数 | 100 | 5 | 因果
      面談設定率 | 0.8 | 9 | 相関
      成約率 | 0.2 | 4 | 因果
    【② 継続稼働人数】
      前月の稼働人数 | 80 | 3 | 因果
      契約更新率 | 0.9 | 8 | 相関
  [B] 1人あたり月間平均売上（円）
    【③ 平均派遣時給】 | 2500 | 6 | 因果
    【④ 月間平均稼働時間】 | 160 | 7 | 因果</textarea>
  </div>
  
  <div class="tree-canvas">
    <div class="canvas-controls-bar">
      <div class="counter-box">
        <div class="count-item"><div class="count-dot" style="background:var(--red)"></div>ボトルネック: <span id="cb-cnt">0</span></div>
        <div class="count-item"><div class="count-dot" style="background:var(--green)"></div>因果確認済: <span id="cc-cnt">0</span></div>
        <div class="count-item"><div class="count-dot" style="background:var(--yellow)"></div>相関のみ: <span id="cr-cnt">0</span></div>
      </div>
      
      <div class="canvas-controls">
        <div class="zoom-ctrl">
          <span>表示サイズ:</span>
          <input type="range" id="zoom-slider" min="0.3" max="1.0" step="0.05" value="0.85">
          <span id="zoom-val">85%</span>
        </div>
        <button class="download-btn" onclick="saveAsImage()">📸 画像として保存</button>
      </div>
    </div>
    
    <div id="capture-target" class="canvas-body">
      <div class="title-zone">
        <div id="canvas-title-display" class="canvas-title"></div>
      </div>
      <div class="tree-zone">
        <div class="tree-view-wrapper">
          <div id="tree-output" class="tree-container"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const input = document.getElementById('tree-input');
const output = document.getElementById('tree-output');
const titleInput = document.getElementById('title-input');
const canvasTitleDisplay = document.getElementById('canvas-title-display');
const zoomSlider = document.getElementById('zoom-slider');
const zoomVal = document.getElementById('zoom-val');

// カウンター要素
const cbCnt = document.getElementById('cb-cnt');
const ccCnt = document.getElementById('cc-cnt');
const crCnt = document.getElementById('cr-cnt');

let globalCounts = { bottleneck: 0, causal: 0, corr: 0 };

function updateTitleDisplay() {
  canvasTitleDisplay.textContent = titleInput.value;
}
titleInput.addEventListener('input', updateTitleDisplay);
updateTitleDisplay(); 

zoomSlider.addEventListener('input', (e) => {
  const val = e.target.value;
  document.documentElement.style.setProperty('--zoom-scale', val);
  zoomVal.textContent = Math.round(val * 100) + '%';
});

// 解析・計算・ボトルネック判定
function parseAndCalculateTree(text) {
  const lines = text.split('\n');
  const nodes = [];
  globalCounts = { bottleneck: 0, causal: 0, corr: 0 };
  
  lines.forEach((line, index) => {
    if (!line.trim()) return;
    const indent = line.search(/\S/);
    const rawName = line.trim();
    
    let name = rawName;
    let customSub = "";
    let value = null;
    let score = 0;
    let rel = "none";
    
    // 「|」で分割
    if (rawName.includes('|')) {
      const parts = rawName.split('|');
      name = parts[0] ? parts[0].trim() : "";
      customSub = parts[1] ? parts[1].trim() : "";
      
      // 数値解析
      const num = parseFloat(customSub.replace(/,/g, ''));
      if (!isNaN(num)) value = num;
      
      // 影響度解析 (parts[2])
      if (parts[2]) {
        const s = parseInt(parts[2].trim());
        if (!isNaN(s)) score = s;
      }
      
      // 関係性解析 (parts[3])
      if (parts[3]) {
        const r = parts[3].trim();
        if (r.includes('因果') || r.toLowerCase() === 'causal') rel = 'causal';
        if (r.includes('相関') || r.toLowerCase() === 'corr') rel = 'corr';
      }
    }
    
    // ★ボトルネックロジックの判定
    let bnStatus = "";
    if (indent >= 0) { // ルート以外
      if ((rel === 'corr' || rel === 'none') && score >= 7) {
        bnStatus = "bottleneck";
        globalCounts.bottleneck++;
      } else if (rel === 'causal') {
        bnStatus = "causal";
        globalCounts.causal++;
      } else if (rel === 'corr') {
        bnStatus = "corr";
        globalCounts.corr++;
      }
    }
    
    nodes.push({ id: index, name, indent, customSub, value, score, rel, bnStatus, children: [] });
  });

  const root = { name: "Root", children: [], indent: -1 };
  const stack = [root];

  nodes.forEach(node => {
    while (stack.length > 1 && stack[stack.length - 1].indent >= node.indent) {
      stack.pop();
    }
    stack[stack.length - 1].children.push(node);
    stack.push(node);
  });

  function rollUp(node) {
    if (node.children.length === 0) return node.value;
    node.children.forEach(child => rollUp(child));
    if (node.value !== null) return node.value;
    
    const childValues = node.children.map(c => c.value).filter(v => v !== null);
    if (childValues.length === 0) return null;
    
    const isAddition = node.name.includes('+') || node.name.includes('＋');
    if (isAddition) {
      node.value = childValues.reduce((sum, v) => sum + v, 0);
    } else {
      node.value = childValues.reduce((prod, v) => prod * v, 1);
    }
    return node.value;
  }
  
  root.children.forEach(rollUp);
  
  // カウンターの更新
  cbCnt.textContent = globalCounts.bottleneck;
  ccCnt.textContent = globalCounts.causal;
  crCnt.textContent = globalCounts.corr;

  return root.children;
}

function generateTreeHtml(nodes, isRoot = true) {
  let html = "";
  
  nodes.forEach(node => {
    const hasChildren = node.children.length > 0;
    const leafClass = hasChildren ? "" : "leaf";
    const rootClass = isRoot ? "root-node" : "";
    const hasValClass = node.value !== null ? "has-val" : "";
    
    // ボトルネックのステータスクラス付与
    let bnClass = "";
    if (node.bnStatus === "bottleneck") bnClass = "bn-bottleneck";
    if (node.bnStatus === "causal") bnClass = "bn-causal";
    if (node.bnStatus === "corr") bnClass = "bn-corr";
    
    let subtitle = node.customSub || "未設定";
    if (node.value !== null) {
      if (Number.isInteger(node.value)) {
        subtitle = node.value.toLocaleString();
      } else {
        subtitle = node.value.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 4 });
      }
    }
    
    // 影響度や関係性が入力されている場合は、サブテキストの横にバッジ風に添える
    if (node.score > 0) {
      const relJa = node.rel === 'causal' ? '因果' : (node.rel === 'corr' ? '相関' : '未定');
      subtitle += ` [影響:${node.score} / ${relJa}]`;
    }

    html += `<div class="tree-branch">`;
    html += `  <div class="node-box ${leafClass} ${rootClass} ${hasValClass} ${bnClass}">`;
    html += `    <div class="node-title" title="${escapeHtml(node.name)}">${escapeHtml(node.name)}</div>`;
    html += `    <div class="node-sub">${escapeHtml(subtitle)}</div>`;
    html += `  </div>`;
    
    if (hasChildren) {
      html += `  <div class="children-container">`;
      html += generateTreeHtml(node.children, false);
      html += `  </div>`;
    }
    html += `</div>`;
  });
  
  return html;
}

function updateTree() {
  const nodes = parseAndCalculateTree(input.value);
  output.innerHTML = generateTreeHtml(nodes);
}

function saveAsImage() {
  const target = document.getElementById('capture-target');
  target.classList.add('exporting');
  setTimeout(() => {
    html2canvas(target, {
      backgroundColor: '#090D13',
      scale: 2,
      logging: false,
      width: target.scrollWidth,
      height: target.scrollHeight
    }).then(canvas => {
      target.classList.remove('exporting');
      const link = document.createElement('a');
      const filename = titleInput.value.trim() || 'bottleneck-tree';
      link.download = filename + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  }, 100);
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

input.addEventListener('input', updateTree);
updateTree(); 
</script>

</body>
</html>
