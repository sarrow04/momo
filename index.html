<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スマホ完全対応・ロジックツリーシミュレーター</title>
<style>
:root{
  --bg:#090D13;       
  --panel-bg:#151922; 
  --border:#30363D;   
  --text:#F0F6FF;     
  --muted:#8B949E;    
  --blue-glow:#388BFD;
  --card-bg:#1F242E;  
  --line-color:#4B5563; 
  --zoom-scale: 1; 
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:16px}

/* ── 📄 印刷・PDF出力用の制御（どんなデバイスから印刷しても「左タイトル・右ツリー」を強制） ── */
@media print {
  @page {
    size: portrait; 
    margin: 15mm;    
  }
  body { 
    padding: 0; 
    background: var(--bg) !important; 
    -webkit-print-color-adjust: exact; 
    print-color-adjust: exact; 
  }
  header, .panel, .canvas-controls-bar { display: none !important; } 
  .layout { display: block !important; height: auto !important; width: 100% !important; }
  .tree-canvas { border: none !important; padding: 0 !important; overflow: visible !important; width: 100% !important; }
  
  /* 印刷時は絶対に横並び（左タイトル・右ツリー）にする */
  .canvas-body { display: flex !important; flex-direction: row !important; gap: 40px !important; }
  .title-zone { 
    width: 200px !important; 
    flex-shrink: 0 !important;
    border-right: 1px solid rgba(48,54,61,0.5) !important; 
    border-bottom: none !important;
    padding-right: 20px !important; 
    padding-bottom: 0 !important; 
  }
  .tree-zone { flex: 1 !important; }
}

header{text-align:center;margin-bottom:20px}
header h1{font-size:18px;font-weight:700;letter-spacing:-.02em}
header p{color:var(--muted);font-size:11px;margin-top:4px}

/* 全体レイアウト */
.layout{display:grid;grid-template-columns:350px 1fr;gap:16px;max-width:1600px;margin:0 auto;height:calc(100vh - 100px)}

/* ── 左側：入力パネル ── */
.panel{background:var(--panel-bg);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;flex-direction:column}
.panel-title{font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--muted);margin-bottom:8px;font-family:monospace;text-transform:uppercase}

#title-input {
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text);
  padding: 10px 12px; font-size: 14px; outline: none; margin-bottom: 16px; transition: border-color 0.2s;
}
#title-input:focus { border-color: var(--blue-glow); }

textarea{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Courier New',monospace;font-size:13px;padding:14px;resize:none;outline:none;line-height:1.6;min-height:250px}
textarea:focus{border-color:var(--blue-glow)}

/* ── 右側：ツリー表示キャンバス ── */
.tree-canvas{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:20px;overflow:auto;display:flex;flex-direction:column;position:relative}

/* コントロール（上部） */
.canvas-controls-bar{display:flex;justify-content:flex-end;align-items:center;margin-bottom:20px;flex-shrink:0;padding-bottom:10px;border-bottom:1px solid rgba(48,54,61,0.3);gap:10px;flex-wrap:wrap;}
.canvas-controls{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.zoom-ctrl{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)}
.zoom-ctrl input[type="range"] { cursor: pointer; accent-color: var(--blue-glow); width: 100px; }
#zoom-val { font-family: monospace; color: var(--text); min-width: 35px; }
.print-btn{background:#238636;color:#fff;border:none;border-radius:6px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:opacity 0.2s;white-space:nowrap}
.print-btn:hover{opacity:0.9}

/* ★PC時の基本構造（横並び） */
.canvas-body { display: flex; gap: 40px; align-items: start; flex: 1; }
.title-zone {
  width: 220px; flex-shrink: 0; padding-top: 10px;
  border-right: 1px solid rgba(48,54,61,0.5); padding-right: 20px;
}
.canvas-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); line-height: 1.4; word-break: break-all; }
.tree-zone { flex: 1; overflow: auto; padding-top: 10px; width: 100%; }
.tree-container {
  transform: scale(var(--zoom-scale)); 
  transform-origin: left top;      
  display: inline-block;
}

/* ── 📱 スマホ・タブレット（画面幅が狭い時）の表示調整 ── */
@media(max-width: 900px){
  body { padding: 8px; }
  .layout { grid-template-columns: 1fr; height: auto; gap: 16px; }
  .panel { min-height: 400px; }
  .tree-canvas { min-height: 500px; padding: 16px; }
  
  /* スマホ画面では「縦並び（上がタイトル、下がツリー）」にしてはみ出しを防ぐ */
  .canvas-body { flex-direction: column; gap: 20px; }
  .title-zone { 
    width: 100%; 
    border-right: none; 
    border-bottom: 1px solid rgba(48,54,61,0.3); 
    padding-right: 0; 
    padding-bottom: 16px; 
  }
  .canvas-title { font-size: 18px; } /* スマホ用に文字サイズを最適化 */
}

/* ── 接続線＆ボックスのデザイン ── */
.tree-line { display: flex; align-items: center; margin-bottom: 8px; white-space: nowrap; }
.prefix {
  font-family: 'Courier New', monospace; font-size: 16px; color: var(--line-color);
  white-space: pre; letter-spacing: 0px; display: inline-block; line-height: 1; user-select: none;
}
.node-box {
  background: var(--card-bg); border: 1px solid var(--border); color: var(--text);
  padding: 8px 14px; border-radius: 8px; min-width: 180px; max-width: 260px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2); display: inline-flex; flex-direction: column; gap: 2px; text-align: left;
}
.node-box.root-node {
  border: 2px solid var(--blue-glow); box-shadow: 0 0 12px rgba(56, 139, 253, 0.2);
}
.node-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.node-sub { font-size: 11px; color: var(--blue-glow); font-weight: 700; font-family: monospace; }
.node-box:not(.has-val) .node-sub { color: var(--muted); font-weight: 400; }
</style>
</head>
<body>

<header>
  <h1>マルチレスポンシブ・ロジックツリー</h1>
</header>

<div class="layout">
  <div class="panel">
    <div class="panel-title">// レポートのタイトル</div>
    <input type="text" id="title-input" placeholder="タイトルを入力" value="派遣ビジネス&#10;売上構造シミュレーション">
    
    <div class="panel-title">// エディタ（「| 数値」で自動計算開始）</div>
    <textarea id="tree-input" spellcheck="false">💰 売上（円）
  [A] 月間稼働人数（人） [+]
    【① 新規稼働人数】
      新規応募数 | 100
      面談設定率 | 0.8
      成約率 | 0.2
    【② 継続稼働人数】
      前月の稼働人数 | 80
      契約更新率 | 0.9
  [B] 1人あたり月間平均売上（円）
    【③ 平均派遣時給】 | 2500
    【④ 月間平均稼働時間】 | 160</textarea>
  </div>
  
  <div class="tree-canvas">
    <div class="canvas-controls-bar">
      <div class="canvas-controls">
        <div class="zoom-ctrl">
          <span>サイズ:</span>
          <input type="range" id="zoom-slider" min="0.4" max="1.2" step="0.05" value="1">
          <span id="zoom-val">100%</span>
        </div>
        <button class="print-btn" onclick="window.print()">📄 PDF·印刷出力</button>
      </div>
    </div>
    
    <div class="canvas-body">
      <div class="title-zone">
        <div id="canvas-title-display" class="canvas-title"></div>
      </div>
      <div class="tree-zone">
        <div class="tree-view-wrapper">
          <div id="tree-output" class="tree-container"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const input = document.getElementById('tree-input');
const output = document.getElementById('tree-output');
const titleInput = document.getElementById('title-input');
const canvasTitleDisplay = document.getElementById('canvas-title-display');
const zoomSlider = document.getElementById('zoom-slider');
const zoomVal = document.getElementById('zoom-val');

function updateTitleDisplay() {
  canvasTitleDisplay.innerHTML = escapeHtml(titleInput.value).replace(/\n/g, '<br>');
}
titleInput.addEventListener('input', updateTitleDisplay);
updateTitleDisplay(); 

zoomSlider.addEventListener('input', (e) => {
  const val = e.target.value;
  document.documentElement.style.setProperty('--zoom-scale', val);
  zoomVal.textContent = Math.round(val * 100) + '%';
});

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function parseAndCalculateTree(text) {
  const lines = text.split('\n');
  const nodes = [];
  
  lines.forEach((line, index) => {
    if (!line.trim()) return;
    const indent = line.search(/\S/);
    const rawName = line.trim();
    
    let name = rawName;
    let customSub = "";
    let value = null;
    
    if (rawName.includes('|')) {
      const parts = rawName.split('|');
      name = parts[0].trim();
      customSub = parts[1].trim();
      const num = parseFloat(customSub.replace(/,/g, ''));
      if (!isNaN(num)) value = num;
    }
    
    nodes.push({ id: index, name, indent, customSub, value, children: [] });
  });

  const root = { name: "Root", children: [], indent: -1 };
  const stack = [root];

  nodes.forEach(node => {
    while (stack.length > 1 && stack[stack.length - 1].indent >= node.indent) {
      stack.pop();
    }
    stack[stack.length - 1].children.push(node);
    stack.push(node);
  });

  function rollUp(node) {
    if (node.children.length === 0) return node.value;
    node.children.forEach(child => rollUp(child));
    if (node.value !== null) return node.value;
    
    const childValues = node.children.map(c => c.value).filter(v => v !== null);
    if (childValues.length === 0) return null;
    
    const isAddition = node.name.includes('+') || node.name.includes('＋');
    if (isAddition) {
      node.value = childValues.reduce((sum, v) => sum + v, 0);
    } else {
      node.value = childValues.reduce((prod, v) => prod * v, 1);
    }
    return node.value;
  }
  
  root.children.forEach(child => rollUp(child));
  return root.children;
}

function generateTreeHtml(nodes, isLastArray = []) {
  let html = "";
  
  nodes.forEach((node, index) => {
    const isLast = index === nodes.length - 1;
    let linePrefix = "";
    
    for (let i = 0; i < isLastArray.length; i++) {
      linePrefix += isLastArray[i] ? "    " : "│   ";
    }
    if (isLastArray.length > 0) {
      linePrefix += isLast ? "└── " : "├── ";
    }

    const hasChildren = node.children.length > 0;
    const rootClass = isLastArray.length === 0 ? "root-node" : "";
    const hasValClass = node.value !== null ? "has-val" : "";
    
    let subtitle = node.customSub || "未設定";
    if (node.value !== null) {
      if (Number.isInteger(node.value)) {
        subtitle = node.value.toLocaleString();
      } else {
        subtitle = node.value.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 4 });
      }
    }

    html += `<div class="tree-line">`;
    if (linePrefix) {
      html += `  <span class="prefix">${linePrefix}</span>`;
    }
    html += `  <div class="node-box ${rootClass} ${hasValClass}">`;
    html += `    <div class="node-title" title="${escapeHtml(node.name)}">${escapeHtml(node.name)}</div>`;
    html += `    <div class="node-sub">${escapeHtml(subtitle)}</div>`;
    html += `  </div>`;
    html += `</div>`;
    
    if (hasChildren) {
      html += generateTreeHtml(node.children, [...isLastArray, isLast]);
    }
  });
  
  return html;
}

function updateTree() {
  const nodes = parseAndCalculateTree(input.value);
  output.innerHTML = generateTreeHtml(nodes);
}

input.addEventListener('input', updateTree);
updateTree(); 
</script>

</body>
</html>
